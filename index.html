<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hành trình Việt Nam - Vườn Cây Hòa Bình Số</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    
    <style>
        :root { --cyber-cyan: #00f2ff; --cyber-green: #39ff14; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* Navigation */
        .nav-tabs { background: #000; border: none; padding: 5px 10px 0; border-bottom: 2px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .nav-link { color: #666; border: none !important; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; padding: 12px 20px; font-family: 'Orbitron', sans-serif; }
        .nav-link.active { background: var(--cyber-cyan) !important; color: #000 !important; box-shadow: 0 -5px 20px rgba(0, 242, 255, 0.4); }

        /* Layout */
        .main-wrapper { display: flex; flex-direction: row; height: calc(100vh - 55px); }
        .sidebar { width: 330px; background: #111; padding: 20px; overflow-y: auto; border-right: 1px solid #222; flex-shrink: 0; }
        .preview-area { flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #previewImg { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.9); border-radius: 8px; image-rendering: -webkit-optimize-contrast; }

        @media (max-width: 992px) { .main-wrapper { flex-direction: column; height: auto; } .sidebar { width: 100%; border-right: none; } .preview-area { height: 60vh; } }

        .group-label { color: var(--cyber-cyan); font-weight: bold; text-transform: uppercase; font-size: 0.75rem; margin-top: 20px; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 5px; letter-spacing: 1px; }
        .form-control { background: #1a1a1a; border: 1px solid #333; color: white; font-size: 0.85rem; margin-bottom: 10px; }
        label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 3px; }
        input[type=range] { width: 100%; accent-color: var(--cyber-cyan); margin-bottom: 12px; }

        .btn-action { font-weight: bold; padding: 12px; border-radius: 4px; border: none; width: 100%; margin-top: 10px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-garden { background: linear-gradient(45deg, #0066ff, var(--cyber-cyan)); color: #fff; }
        .btn-save { background: #222; color: #888; }

        /* --- VƯỜN CÂY --- */
        .garden-container { 
            padding: 40px; background: radial-gradient(circle at center, #0a1a2f 0%, #000 100%); 
            min-height: 100%; position: relative; overflow-y: auto; display: flex; flex-direction: column;
        }
        .garden-stats { background: rgba(0,0,0,0.4); padding: 30px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.2); margin-bottom: 50px; }
        .garden-stats h2 { font-family: 'Orbitron', sans-serif; color: var(--cyber-cyan); text-shadow: 0 0 15px var(--cyber-cyan); margin-bottom: 5px; }
        .sub-founder { font-size: 0.8rem; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }

        .garden-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 60px 40px; justify-items: center; flex-grow: 1; }
        
        .tech-node { width: 120px; position: relative; cursor: pointer; transition: 0.4s; display: flex; flex-direction: column; align-items: center; }
        .tech-node::after {
            content: ''; position: absolute; bottom: 35px; width: 60px; height: 15px;
            background: radial-gradient(ellipse at center, rgba(0, 242, 255, 0.5) 0%, transparent 70%);
            border-radius: 50%; transform: scaleX(1.5); filter: blur(2px); z-index: 1;
            animation: pulse-plate 3s infinite ease-in-out;
        }
        .mam-xanh-img { width: 85px; height: 85px; object-fit: contain; z-index: 2; filter: drop-shadow(0 0 10px var(--cyber-green)); animation: pulse-mam 3s infinite ease-in-out; }
        .node-name { margin-top: 15px; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: #fff; font-weight: bold; text-transform: uppercase; text-align: center; white-space: nowrap; width: 140px; overflow: hidden; text-overflow: ellipsis; }

        /* MODAL CẤU HÌNH THẤP XUỐNG */
        .modal-dialog { 
            margin-top: 80px; 
            max-width: 850px; 
        }
        .modal-content { background: #000 !important; border: 1px solid rgba(255,255,255,0.1) !important; box-shadow: 0 0 50px rgba(0, 0, 0, 1); border-radius: 15px; overflow: hidden; }
        .modal-body { padding: 15px !important; display: flex; flex-direction: column; align-items: center; }
        
        #modalImg { 
            width: 100%; 
            max-height: 70vh; 
            object-fit: contain; 
            border-radius: 8px;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: auto;
        }

        .btn-close-interface {
            background: #111; border: 1px solid #333; color: #888;
            font-family: 'Orbitron'; font-size: 0.75rem; padding: 10px 30px;
            margin-top: 20px; border-radius: 5px; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-close-interface:hover { border-color: var(--cyber-cyan); color: var(--cyber-cyan); box-shadow: 0 0 15px var(--cyber-cyan); }

        @keyframes pulse-mam { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.05) translateY(-5px); } }
        @keyframes pulse-plate { 0%, 100% { transform: scaleX(1.5); opacity: 0.3; } 50% { transform: scaleX(2); opacity: 0.6; } }

        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner-border text-info" style="width: 4rem; height: 4rem;"></div>
    <div class="mt-4 text-info fw-bold" style="font-family: 'Orbitron';">GENESIS HIGH-FIDELITY SEED...</div>
</div>

<ul class="nav nav-tabs" id="myTab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#edit-pane">Thiết kế thông điệp</button></li>
    <li class="nav-item"><button class="nav-link" id="garden-tab-btn" data-bs-toggle="tab" data-bs-target="#garden-pane">Vườn cây Hòa Bình Số</button></li>
</ul>

<div class="tab-content">
    <div class="tab-pane fade show active" id="edit-pane">
        <div class="main-wrapper">
            <div class="sidebar">
                <div class="group-label">1. Thông tin mầm xanh</div>
                <input type="file" id="uploadAvatar" class="form-control" accept="image/*">
                <input type="text" id="inpName" class="form-control" placeholder="Họ và tên">
                <input type="text" id="inpUnit" class="form-control" placeholder="Đơn vị">
                <input type="text" id="inpProv" class="form-control" placeholder="Tỉnh / Thành phố">
                <textarea id="inpMessage" class="form-control" rows="3" placeholder="Thông điệp hòa bình..."></textarea>

                <div class="group-label">2. Cấu hình chỉnh ảnh</div>
                <div class="row g-2">
                    <div class="col-6"><label>Trái / Phải</label><input type="range" id="avtX" min="-500" max="500" value="0"></div>
                    <div class="col-6"><label>Lên / Xuống</label><input type="range" id="avtY" min="-500" max="500" value="0"></div>
                </div>
                <label>Phóng to:</label><input type="range" id="avtScale" min="0.5" max="2.5" step="0.01" value="1.1">
                <label>Mờ ngực:</label><input type="range" id="fadeStart" min="20" max="85" value="55">

                <div class="group-label">3. Hiệu chuẩn số</div>
                <label>Cỡ chữ:</label><input type="range" id="msgSize" min="15" max="45" value="28">
                <label>Độ rộng khung:</label><input type="range" id="msgWidth" min="300" max="850" value="730">
                <label>Vị trí dọc:</label><input type="range" id="msgY" min="-300" max="300" value="0">
                <label>Tông màu ấm:</label><input type="range" id="warmth" min="0" max="50" value="10">

                <button onclick="addToGarden()" class="btn-action btn-garden">Kích hoạt & Gieo mầm</button>
                <button onclick="downloadImage()" class="btn-action btn-save">Lưu bản phôi</button>
            </div>
            <div class="preview-area">
                <img id="previewImg" src="">
            </div>
        </div>
    </div>

    <div class="tab-pane fade" id="garden-pane">
        <div class="garden-container text-center">
            <div class="garden-stats">
                <h2>VƯỜN ƯƠM MẦM XANH HÒA BÌNH</h2>
                <div class="sub-founder">Thuộc chuỗi dự án hành trình số Việt Nam my love - founder Đinh Thị Ngọc</div>
                <p class="text-info fs-5">Hệ thống ghi nhận <b id="treeCount" style="font-size: 3rem; color: #fff;">0</b> mầm xanh đã kích hoạt</p>
            </div>
            <div class="garden-grid" id="gardenGrid"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="treeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body">
                <img id="modalImg" src="">
                <button class="btn-close-interface" data-bs-dismiss="modal">CLOSE INTERFACE</button>
            </div>
        </div>
    </div>
</div>

<canvas id="mainCanvas" style="display:none;"></canvas>
<canvas id="tempCanvas" style="display:none;"></canvas>
<canvas id="thumbCanvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Chặn chuột phải & Phím tắt
document.addEventListener('contextmenu', event => event.preventDefault());
document.onkeydown = function(e) {
    if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
}

    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxmdZRqmQLtPmr6JvkUGyrk-wU1YQj-GcA4Yhf4JuqJfMix4jWkUWkRKxTllCUOM4FQ/exec"; 
    const BG_URL = "https://lh3.googleusercontent.com/d/1cRbxHdO493piuTnWIEK8qJhOMyQvw9DU";
    const LOGO_MAM = "https://lh3.googleusercontent.com/d/1jgDhcCF-679rlFneGkZbFr2s56hatIHz";

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // Tối ưu vẽ
    const previewImg = document.getElementById('previewImg');
    let bgImg = new Image();
    let processedUserCanvas = null;

    function toTitleCase(str) {
        if(!str) return "";
        return str.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    document.getElementById('garden-tab-btn').addEventListener('click', fetchGardenData);

    const selfieSegmentation = new SelfieSegmentation({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}` });
    selfieSegmentation.setOptions({ modelSelection: 1 });
    selfieSegmentation.onResults(onAIResults);

    bgImg.crossOrigin = "anonymous";
    bgImg.src = BG_URL;
    bgImg.onload = () => { canvas.width = bgImg.width; canvas.height = bgImg.height; update(); };

    document.getElementById('uploadAvatar').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('loading').style.display = 'flex';
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => selfieSegmentation.send({image: img});
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    function onAIResults(results) {
        const tCanvas = document.getElementById('tempCanvas');
        const tCtx = tCanvas.getContext('2d');
        tCanvas.width = results.image.width; tCanvas.height = results.image.height;
        tCtx.save();
        tCtx.drawImage(results.segmentationMask, 0, 0);
        tCtx.globalCompositeOperation = 'source-in';
        tCtx.drawImage(results.image, 0, 0);
        tCtx.restore();
        processedUserCanvas = tCanvas;
        document.getElementById('loading').style.display = 'none';
        update();
    }

    function update() {
        if(!bgImg.complete) return;
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImg, 0, 0);
        if(processedUserCanvas) {
            ctx.save();
            const scale = parseFloat(document.getElementById('avtScale').value);
            const w = processedUserCanvas.width * (canvas.height / processedUserCanvas.height) * 0.52 * scale;
            const h = canvas.height * 0.52 * scale;
            const x = 476 + parseInt(document.getElementById('avtX').value);
            const y = 435 + parseInt(document.getElementById('avtY').value);
            const clipCanvas = document.createElement('canvas');
            clipCanvas.width = w; clipCanvas.height = h;
            const clipCtx = clipCanvas.getContext('2d');
            clipCtx.imageSmoothingEnabled = true;
            clipCtx.imageSmoothingQuality = 'high';
            clipCtx.drawImage(processedUserCanvas, 0, 0, w, h);
            clipCtx.globalCompositeOperation = 'destination-in';
            const grad = clipCtx.createLinearGradient(0, 0, 0, h);
            const fade = parseInt(document.getElementById('fadeStart').value)/100;
            grad.addColorStop(0, 'rgba(0,0,0,1)'); grad.addColorStop(fade - 0.15, 'rgba(0,0,0,1)'); grad.addColorStop(fade, 'rgba(0,0,0,0)');
            clipCtx.fillStyle = grad; clipCtx.fillRect(0,0,w,h);
            ctx.filter = `sepia(${document.getElementById('warmth').value}%) contrast(105%)`;
            ctx.drawImage(clipCanvas, x - w/2, y - h/2);
            ctx.restore();
        }
        drawText();
        previewImg.src = canvas.toDataURL('image/jpeg', 0.95); // Tăng chất lượng preview
    }

    function drawText() {
        const name = (document.getElementById('inpName').value || "HỌ TÊN").toUpperCase();
        const unit = document.getElementById('inpUnit').value || "Đơn vị";
        const prov = document.getElementById('inpProv').value || "Tỉnh/TP";
        const msgSize = parseInt(document.getElementById('msgSize').value);
        const msgWidth = parseInt(document.getElementById('msgWidth').value);
        const msgY = 365 + parseInt(document.getElementById('msgY').value);
        ctx.textAlign = "center";
        ctx.fillStyle = "#ffff00"; ctx.font = "bold 34px Roboto"; ctx.fillText(name, 365, 730);
        ctx.fillStyle = "#FFE4E1"; ctx.font = "italic 21px Roboto"; ctx.fillText(unit, 365, 770); ctx.fillText(prov, 365, 800);
        ctx.textAlign = "left"; ctx.fillStyle = "#5d1010"; ctx.font = `${msgSize}px Roboto`;
        wrapJustifiedText(ctx, document.getElementById('inpMessage').value || "Thông điệp hòa bình...", 690, msgY, msgWidth, msgSize * 1.5);
    }

    function wrapJustifiedText(context, text, x, y, maxWidth, lineHeight) {
        let words = text.split(' '), lines = [], currentLine = words[0];
        for (let i = 1; i < words.length; i++) {
            if (context.measureText(currentLine + " " + words[i]).width < maxWidth) currentLine += " " + words[i];
            else { lines.push(currentLine); currentLine = words[i]; }
        }
        lines.push(currentLine);
        lines.forEach((line, index) => {
            if (index === lines.length - 1 || line.split(' ').length === 1) context.fillText(line, x, y);
            else {
                let wds = line.split(' '), tw = 0;
                wds.forEach(w => tw += context.measureText(w).width);
                let sp = (maxWidth - tw) / (wds.length - 1), tx = x;
                wds.forEach(w => { context.fillText(w, tx, y); tx += context.measureText(w).width + sp; });
            }
            y += lineHeight;
        });
    }

    async function fetchGardenData() {
        try {
            const res = await fetch(GOOGLE_SCRIPT_URL);
            const data = await res.json();
            document.getElementById('treeCount').innerText = data.total;
            renderGarden(data.items);
        } catch (e) { console.log("Lỗi tải vườn."); }
    }

    function renderGarden(items) {
        const grid = document.getElementById('gardenGrid');
        grid.innerHTML = "";
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = "tech-node";
            div.innerHTML = `<img src="${LOGO_MAM}" class="mam-xanh-img"><div class="node-name">${toTitleCase(item.hoten)}</div>`;
            div.onclick = () => {
                const mImg = document.getElementById('modalImg');
                mImg.src = item.imgData;
                new bootstrap.Modal(document.getElementById('treeModal')).show();
            };
            grid.appendChild(div);
        });
    }

    async function addToGarden() {
        const nameVal = document.getElementById('inpName').value;
        if(!nameVal) return alert("Vui lòng nhập tên!");
        document.getElementById('loading').style.display = 'flex';
        
        const thumbCanvas = document.getElementById('thumbCanvas');
        const tctx = thumbCanvas.getContext('2d');
        const MAX_WIDTH = 3000; // 
        const scale = MAX_WIDTH / canvas.width;
        thumbCanvas.width = MAX_WIDTH;
        thumbCanvas.height = canvas.height * scale;

        tctx.imageSmoothingEnabled = true;
        tctx.imageSmoothingQuality = 'high';
        tctx.drawImage(canvas, 0, 0, thumbCanvas.width, thumbCanvas.height);
        const imgDataShort = thumbCanvas.toDataURL('image/jpeg', 1); // Tăng chất lượng file gửi đi

        const payload = { 
            hoten: nameVal, donvi: document.getElementById('inpUnit').value, 
            tinh: document.getElementById('inpProv').value, thongdiep: document.getElementById('inpMessage').value, 
            imgData: imgDataShort 
        };

        try {
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            downloadImage();
            document.getElementById('loading').style.display = 'none';
            alert("ĐÃ GIEO MẦM THÀNH CÔNG!");
            fetchGardenData();
            new bootstrap.Tab(document.getElementById('garden-tab-btn')).show();
        } catch (e) { document.getElementById('loading').style.display = 'none'; }
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = `HanhTrinhSo_${Date.now()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.98); // Chất lượng tối đa khi tải về
        link.click();
    }
    document.querySelectorAll('input, textarea').forEach(el => el.oninput = update);
</script>
</body>
</html>
